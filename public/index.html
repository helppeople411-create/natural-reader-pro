<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natural Reader Pro | AI-Powered TTS</title>
    <meta name="description" content="Convert your documents and text to natural-sounding speech using advanced AI models. Supports PDF and Word uploads.">
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    
    <div class="app-container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-volume-high"></i>
                <h1>Natural Reader <span>Pro</span></h1>
            </div>
            <p class="subtitle">Experience AI-driven clarity and precision in every word.</p>
        </header>

        <main class="glass-card">
            <!-- Voice Controls Section -->
            <div class="controls-grid">
                <div class="control-group">
                    <label for="voiceSelect"><i class="fa-solid fa-microphone-lines"></i> Voice Model</label>
                    <div class="select-wrapper">
                        <select id="voiceSelect">
                            <option value="" disabled selected>Loading voices...</option>
                        </select>
                    </div>
                </div>
                
                <div class="control-group">
                    <label for="speed"><i class="fa-solid fa-gauge-high"></i> Playback Speed: <span id="speedValue">1.0x</span></label>
                    <input type="range" id="speed" min="0.5" max="3.0" step="0.1" value="1.0" class="slider">
                </div>
            </div>

            <!-- Upload/Input Section -->
            <div class="input-section">
                <div class="upload-zone" id="uploadZone">
                    <label for="fileInput" class="upload-label">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <span>Drop PDF/DOCX or <strong>Click to Upload</strong></span>
                        <input type="file" id="fileInput" accept=".pdf,.docx" hidden>
                    </label>
                    <div id="fileName" class="file-status"></div>
                </div>

                <textarea id="textInput" placeholder="Enter text to synthesize... OR upload a document above to extract its content."></textarea>
            </div>

            <!-- Action Buttons -->
            <div class="action-bar">
                <button id="speakBtn" class="btn primary">
                    <i class="fa-solid fa-play"></i> Generate Speech
                </button>
                <button id="stopBtn" class="btn secondary">
                    <i class="fa-solid fa-stop"></i> Stop
                </button>
            </div>

            <!-- Audio Player (Hidden visually, functionality remains) -->
            <div id="playerContainer" class="player-container hidden">
                <audio id="audioPlayer" controls></audio>
                <div class="player-status">
                    <i class="fa-solid fa-wave-square pulse"></i>
                    <span>Audio Ready</span>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 Natural Reader Pro. Powered by Google AI.</p>
        </footer>
    </div>

    <!-- Loading Overlay -->
    <div id="loader" class="loader-overlay hidden">
        <div class="spinner"></div>
        <p>Synthesizing with AI...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
